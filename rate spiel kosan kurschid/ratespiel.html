<!DOCTYPE html>
<html lang="de">
<head>
  <title>Ratespiel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Zahlen Ratespiel</h1>
  <p>Ich denke an eine Zahl zwischen 1 und 100. Kannst du sie erraten?</p>

  <input type="number" id="eingabe" placeholder="Zahl..." min="1" max="100">
  <button onclick="raten()">Raten</button>
  <button onclick="neustart()">Neu starten</button>

  <div id="meldung"></div>
  <div id="versuche"></div>

  <script src="spiel.js"></script>

</body>
</html>
